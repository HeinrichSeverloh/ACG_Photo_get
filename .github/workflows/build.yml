name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 关键：赋予 GitHub 机器人创建 Release 和上传文件的权限
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 安装项目依赖（读取你新建的 requirements.txt）+ 通用打包工具
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      # 关键修复：只有 macOS 才额外安装 py2app（否则 Mac 构建必崩）
      - name: Install macOS specific tools
        if: matrix.os == 'macos-latest'
        run: |
          pip install py2app

      # 执行项目自带的打包脚本
      - name: Build with build_exe.py
        run: |
          python build_exe.py

      # 关键修复：按系统分别命名，防止 Windows/Linux/Mac 互相覆盖
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACG_Photo_Get-${{ matrix.os }}
          path: dist/

      # 只有打 Tag（如 v1.0.0）时才自动发布到 Release
      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**